<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Osler — Pacientes</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/crud.css" />
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">⚕</div>
        <span class="sidebar-title">Osler</span>
    </div>
    <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
            <span class="nav-icon">🏠</span><span class="nav-label">Inicio</span>
        </a>
        <a href="pacientes.html" class="nav-item active">
            <span class="nav-icon">👥</span><span class="nav-label">Pacientes</span>
        </a>
        <a href="doctores.html" class="nav-item">
            <span class="nav-icon">🩺</span><span class="nav-label">Doctores</span>
        </a>
        <a href="citas.html" class="nav-item">
            <span class="nav-icon">📅</span><span class="nav-label">Citas</span>
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="user-info" id="userInfo"></div>
        <button class="btn-logout" onclick="logout()">🚪 Cerrar sesión</button>
    </div>
</aside>

<!-- MAIN -->
<main class="main-content">
    <header class="top-bar">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <h1 class="page-title">Pacientes</h1>
        <span class="top-bar-user" id="topUser"></span>
    </header>

    <div class="content-area">

        <!-- Barra de herramientas -->
        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar por nombre, apellido o documento…" />
                <button onclick="buscar()">🔍</button>
            </div>
            <button class="btn-primary" onclick="abrirModal()">➕ Nuevo Paciente</button>
        </div>

        <!-- Alerta global -->
        <div id="alertMsg" class="alert hidden"></div>

        <!-- Tabla -->
        <div class="table-wrapper">
            <table class="data-table" id="tablaPacientes">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre completo</th>
                        <th>Documento</th>
                        <th>Fecha Nac.</th>
                        <th>Género</th>
                        <th>Teléfono</th>
                        <th>Ciudad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr><td colspan="8" class="loading-row">Cargando pacientes…</td></tr>
                </tbody>
            </table>
        </div>
        <div class="table-footer">
            <span id="totalCount"></span>
        </div>
    </div>
</main>

<!-- ============================================================
     MODAL — Crear / Editar Paciente
     ============================================================ -->
<div class="modal-overlay" id="modalOverlay" onclick="cerrarModalSiClick(event)">
    <div class="modal" id="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Nuevo Paciente</h3>
            <button class="modal-close" onclick="cerrarModal()">✕</button>
        </div>

        <div class="modal-body">
            <div id="modalAlert" class="alert hidden"></div>
            <form id="pacienteForm" novalidate>
                <input type="hidden" id="pacienteId" />

                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre *</label>
                        <input type="text" id="fNombre" maxlength="100" required />
                        <span class="field-error" id="eNombre"></span>
                    </div>
                    <div class="form-group">
                        <label>Apellido *</label>
                        <input type="text" id="fApellido" maxlength="100" required />
                        <span class="field-error" id="eApellido"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo de documento *</label>
                        <select id="fTipoDoc" required>
                            <option value="">— Selecciona —</option>
                            <option value="CC">Cédula de Ciudadanía</option>
                            <option value="TI">Tarjeta de Identidad</option>
                            <option value="CE">Cédula Extranjería</option>
                            <option value="Pasaporte">Pasaporte</option>
                        </select>
                        <span class="field-error" id="eTipoDoc"></span>
                    </div>
                    <div class="form-group">
                        <label>Número de documento *</label>
                        <input type="text" id="fNumDoc" maxlength="30" required />
                        <span class="field-error" id="eNumDoc"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Fecha de nacimiento *</label>
                        <input type="date" id="fFechaNac" required />
                        <span class="field-error" id="eFechaNac"></span>
                    </div>
                    <div class="form-group">
                        <label>Género *</label>
                        <select id="fGenero" required>
                            <option value="">— Selecciona —</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Otro">Otro</option>
                        </select>
                        <span class="field-error" id="eGenero"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" id="fTelefono" maxlength="20" />
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="fEmail" maxlength="150" />
                        <span class="field-error" id="eEmail"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" id="fDireccion" maxlength="255" />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Ciudad</label>
                        <input type="text" id="fCiudad" maxlength="100" />
                    </div>
                    <div class="form-group">
                        <label>Tipo de sangre</label>
                        <select id="fSangre">
                            <option value="">— No especificado —</option>
                            <option value="A_POS">A+</option>
                            <option value="A_NEG">A-</option>
                            <option value="B_POS">B+</option>
                            <option value="B_NEG">B-</option>
                            <option value="AB_POS">AB+</option>
                            <option value="AB_NEG">AB-</option>
                            <option value="O_POS">O+</option>
                            <option value="O_NEG">O-</option>
                        </select>
                    </div>
                </div>
            </form>
        </div>

        <div class="modal-footer">
            <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-primary" id="btnGuardar" onclick="guardar()">💾 Guardar</button>
        </div>
    </div>
</div>

<!-- MODAL Confirmar eliminación -->
<div class="modal-overlay" id="deleteOverlay" onclick="cerrarDeleteSiClick(event)">
    <div class="modal modal-sm" id="deleteModal">
        <div class="modal-header">
            <h3>Confirmar eliminación</h3>
            <button class="modal-close" onclick="cerrarDelete()">✕</button>
        </div>
        <div class="modal-body">
            <p>¿Estás seguro de que deseas eliminar al paciente <strong id="deleteNombre"></strong>?</p>
            <p class="text-muted">Esta acción desactivará el registro (no se borra de la BD).</p>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="cerrarDelete()">Cancelar</button>
            <button class="btn-danger" id="btnConfirmDelete" onclick="confirmarEliminar()">🗑 Eliminar</button>
        </div>
    </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/pacientes.js"></script>
<script>
    requireAuth();
    const user = getUser();
    document.getElementById('topUser').textContent = `${user.nombre} (${user.rol})`;
    document.getElementById('userInfo').innerHTML = `<strong>${user.nombre} ${user.apellido}</strong><br><small>${user.rol}</small>`;
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    // Buscar al presionar Enter
    document.getElementById('searchInput').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') buscar();
        if (this.value === '') cargarPacientes();
    });
</script>
</body>
</html>
