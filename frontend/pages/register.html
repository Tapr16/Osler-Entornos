<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osler - Registro de Pacientes</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }
        .full-width { grid-column: span 2; }
        .form-group { margin-bottom: 0.5rem !important; }
        .form-group label { font-size: 0.8rem; margin-bottom: 0.25rem !important; display: block; }
        .form-group input, .form-group select { padding: 0.5rem !important; font-size: 0.85rem !important; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-left">
            <div class="brand">
                <div class="brand-icon">⚕</div>
                <h1 class="brand-name" style="font-size: 2.5rem;">Osler</h1>
                <p class="brand-tagline">Tu salud en buenas manos</p>
            </div>
            <ul class="features" style="gap: 0.5rem;">
                <li style="padding: 0.5rem 0.75rem;"><span class="feat-icon">🧬</span> Registro rápido y seguro</li>
                <li style="padding: 0.5rem 0.75rem;"><span class="feat-icon">🗓️</span> Agenda citas en segundos</li>
                <li style="padding: 0.5rem 0.75rem;"><span class="feat-icon">📂</span> Tu historial siempre contigo</li>
            </ul>
        </div>

        <div class="login-right" style="width: 550px;">
            <div class="login-card" style="max-width: 500px; padding: 1.5rem; margin: 1rem;">
                <div class="login-header" style="margin-bottom: 1rem;">
                    <h2 style="color: var(--text-primary); font-size: 1.4rem;">Crear Cuenta</h2>
                    <p style="color: var(--text-muted); font-size: 0.8rem;">Regístrate como paciente</p>
                </div>

                <form id="registerForm" class="login-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label style="color: var(--text-primary); font-weight: 500;">Nombre *</label>
                            <input type="text" id="regNombre" required placeholder="Ej: Juan">
                        </div>
                        <div class="form-group">
                            <label style="color: var(--text-primary); font-weight: 500;">Apellido *</label>
                            <input type="text" id="regApellido" required placeholder="Ej: Pérez">
                        </div>
                        <div class="form-group">
                            <label style="color: var(--text-primary); font-weight: 500;">Tipo Documento *</label>
                            <select id="regTipoDoc" required>
                                <option value="CC">Cédula (CC)</option>
                                <option value="TI">Tarjeta Identidad (TI)</option>
                                <option value="CE">Cédula Extranjería (CE)</option>
                                <option value="Pasaporte">Pasaporte</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label style="color: var(--text-primary); font-weight: 500;">No. Documento *</label>
                            <input type="text" id="regNumDoc" required placeholder="12345678">
                        </div>
                        <div class="form-group">
                            <label style="color: var(--text-primary); font-weight: 500;">Fecha de Nacimiento *</label>
                            <input type="date" id="regFechaNac" required>
                        </div>
                        <div class="form-group">
                            <label style="color: var(--text-primary); font-weight: 500;">Género *</label>
                            <select id="regGenero" required>
                                <option value="Masculino">Masculino</option>
                                <option value="Femenino">Femenino</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label style="color: var(--text-primary); font-weight: 500;">Email *</label>
                            <input type="email" id="regEmail" required placeholder="tu@correo.com">
                        </div>
                        <div class="form-group full-width">
                            <label style="color: var(--text-primary); font-weight: 500;">Contraseña *</label>
                            <input type="password" id="regPassword" required placeholder="••••••••">
                        </div>
                        <div class="form-group">
                            <label style="color: var(--text-primary); font-weight: 500;">Teléfono</label>
                            <input type="text" id="regTelefono" placeholder="300 123 4567">
                        </div>
                        <div class="form-group">
                            <label style="color: var(--text-primary); font-weight: 500;">Ciudad</label>
                            <input type="text" id="regCiudad" placeholder="Ej: Bucaramanga">
                        </div>
                        <div class="form-group full-width">
                            <label style="color: var(--text-primary); font-weight: 500;">Dirección</label>
                            <input type="text" id="regDireccion" placeholder="Carrera 12 #34-56">
                        </div>
                        <div class="form-group">
                            <label style="color: var(--text-primary); font-weight: 500;">Emergencia (Nombre)</label>
                            <input type="text" id="regEmergNombre" placeholder="Nombre completo">
                        </div>
                        <div class="form-group">
                            <label style="color: var(--text-primary); font-weight: 500;">Emergencia (Tlf)</label>
                            <input type="text" id="regEmergTlf" placeholder="Teléfono">
                        </div>
                    </div>

                    <div id="errorMsg" class="alert error hidden" style="margin-top: 0.5rem; font-size: 0.8rem; padding: 0.5rem;"></div>
                    <div id="successMsg" class="alert success hidden" style="margin-top: 0.5rem; font-size: 0.8rem; padding: 0.5rem;"></div>

                    <button type="submit" class="btn-login" style="margin-top: 1rem; padding: 0.6rem;">
                        <span id="btnText">Crear Cuenta</span>
                        <span id="btnSpinner" class="spinner hidden"></span>
                    </button>
                    
                    <p class="login-hint" style="margin-top: 1rem; padding: 0.5rem;">
                        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            // Reset state
            btn.disabled = true;
            btnText.textContent = 'Registrando...';
            btnSpinner.classList.remove('hidden');
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            const payload = {
                nombre: document.getElementById('regNombre').value,
                apellido: document.getElementById('regApellido').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                tipoDocumento: document.getElementById('regTipoDoc').value,
                numeroDocumento: document.getElementById('regNumDoc').value,
                fechaNacimiento: document.getElementById('regFechaNac').value,
                genero: document.getElementById('regGenero').value,
                telefono: document.getElementById('regTelefono').value,
                ciudad: document.getElementById('regCiudad').value,
                direccion: document.getElementById('regDireccion').value,
                contactoEmergenciaNombre: document.getElementById('regEmergNombre').value,
                contactoEmergenciaTelefono: document.getElementById('regEmergTlf').value
            };

            try {
                const res = await fetch('http://localhost:8080/api/auth/register-paciente', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.mensaje || 'Error en el registro');

                successMsg.textContent = data.mensaje || 'Registro exitoso. Ya puedes iniciar sesión.';
                successMsg.classList.remove('hidden');
                e.target.reset();
                setTimeout(() => window.location.href = 'login.html', 3000);

            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Crear Cuenta';
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
