<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Osler — Doctores</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/crud.css" />
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">⚕</div>
        <span class="sidebar-title">Osler</span>
    </div>
    <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
            <span class="nav-icon">🏠</span><span class="nav-label">Inicio</span>
        </a>
        <a href="pacientes.html" class="nav-item">
            <span class="nav-icon">👥</span><span class="nav-label">Pacientes</span>
        </a>
        <a href="doctores.html" class="nav-item active">
            <span class="nav-icon">🩺</span><span class="nav-label">Doctores</span>
        </a>
        <a href="citas.html" class="nav-item">
            <span class="nav-icon">📅</span><span class="nav-label">Citas</span>
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="user-info" id="userInfo"></div>
        <button class="btn-logout" onclick="logout()">🚪 Cerrar sesión</button>
    </div>
</aside>

<!-- MAIN -->
<main class="main-content">
    <header class="top-bar">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <h1 class="page-title">Doctores</h1>
        <span class="top-bar-user" id="topUser"></span>
    </header>

    <div class="content-area">

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar por nombre, licencia o especialidad…" />
                <button onclick="buscar()">🔍</button>
            </div>
            <button class="btn-primary" onclick="abrirModal()">➕ Nuevo Doctor</button>
        </div>

        <div id="alertMsg" class="alert hidden"></div>

        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre completo</th>
                        <th>Licencia</th>
                        <th>Especialidad</th>
                        <th>Turno</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr><td colspan="7" class="loading-row">Cargando doctores…</td></tr>
                </tbody>
            </table>
        </div>
        <div class="table-footer">
            <span id="totalCount"></span>
        </div>
    </div>
</main>

<!-- MODAL Crear / Editar -->
<div class="modal-overlay" id="modalOverlay" onclick="cerrarModalSiClick(event)">
    <div class="modal" id="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Nuevo Doctor</h3>
            <button class="modal-close" onclick="cerrarModal()">✕</button>
        </div>
        <div class="modal-body">
            <div id="modalAlert" class="alert hidden"></div>
            <form id="doctorForm" novalidate>
                <input type="hidden" id="doctorId" />

                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre *</label>
                        <input type="text" id="fNombre" maxlength="100" required />
                        <span class="field-error" id="eNombre"></span>
                    </div>
                    <div class="form-group">
                        <label>Apellido *</label>
                        <input type="text" id="fApellido" maxlength="100" required />
                        <span class="field-error" id="eApellido"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Número de licencia *</label>
                        <input type="text" id="fLicencia" maxlength="50" required />
                        <span class="field-error" id="eLicencia"></span>
                    </div>
                    <div class="form-group">
                        <label>Especialidad *</label>
                        <select id="fEspecialidad" required>
                            <option value="">— Selecciona —</option>
                        </select>
                        <span class="field-error" id="eEspecialidad"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Turno</label>
                        <select id="fTurno">
                            <option value="MANANA">Mañana</option>
                            <option value="TARDE">Tarde</option>
                            <option value="NOCHE">Noche</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" id="fTelefono" maxlength="20" />
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="fEmail" maxlength="150" />
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-primary" id="btnGuardar" onclick="guardar()">💾 Guardar</button>
        </div>
    </div>
</div>

<!-- MODAL Confirmar eliminación -->
<div class="modal-overlay" id="deleteOverlay" onclick="cerrarDeleteSiClick(event)">
    <div class="modal modal-sm">
        <div class="modal-header">
            <h3>Confirmar eliminación</h3>
            <button class="modal-close" onclick="cerrarDelete()">✕</button>
        </div>
        <div class="modal-body">
            <p>¿Eliminar al doctor <strong id="deleteNombre"></strong>?</p>
            <p class="text-muted">El registro quedará inactivo en la base de datos.</p>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="cerrarDelete()">Cancelar</button>
            <button class="btn-danger" id="btnConfirmDelete" onclick="confirmarEliminar()">🗑 Eliminar</button>
        </div>
    </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/doctores.js"></script>
<script>
    requireAuth();
    const user = getUser();
    document.getElementById('topUser').textContent = `${user.nombre} (${user.rol})`;
    document.getElementById('userInfo').innerHTML = `<strong>${user.nombre} ${user.apellido}</strong><br><small>${user.rol}</small>`;
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    document.getElementById('searchInput').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') buscar();
        if (this.value === '') cargarDoctores();
    });
</script>
</body>
</html>
