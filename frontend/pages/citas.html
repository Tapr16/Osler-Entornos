<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Osler — Citas Médicas</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/crud.css" />
    <style>
        .badge-estado { font-size: .82rem; }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">⚕</div>
        <span class="sidebar-title">Osler</span>
    </div>
    <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
            <span class="nav-icon">🏠</span><span class="nav-label">Inicio</span>
        </a>
        <a href="pacientes.html" class="nav-item">
            <span class="nav-icon">👥</span><span class="nav-label">Pacientes</span>
        </a>
        <a href="doctores.html" class="nav-item">
            <span class="nav-icon">🩺</span><span class="nav-label">Doctores</span>
        </a>
        <a href="citas.html" class="nav-item active">
            <span class="nav-icon">📅</span><span class="nav-label">Citas</span>
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="user-info" id="userInfo"></div>
        <button class="btn-logout" onclick="logout()">🚪 Cerrar sesión</button>
    </div>
</aside>

<!-- MAIN -->
<main class="main-content">
    <header class="top-bar">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <h1 class="page-title">Citas Médicas</h1>
        <span class="top-bar-user" id="topUser"></span>
    </header>

    <div class="content-area">

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar por paciente, doctor o motivo…" />
                <button onclick="buscar()">🔍</button>
            </div>
            <button class="btn-primary" onclick="abrirModal()">➕ Nueva Cita</button>
        </div>

        <div id="alertMsg" class="alert hidden"></div>

        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Paciente</th>
                        <th>Doctor</th>
                        <th>Fecha y Hora</th>
                        <th>Duración</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr><td colspan="7" class="loading-row">Cargando citas…</td></tr>
                </tbody>
            </table>
        </div>
        <div class="table-footer">
            <span id="totalCount"></span>
        </div>
    </div>
</main>

<!-- MODAL Crear / Editar -->
<div class="modal hidden" id="modalOverlay" onclick="cerrarModalSiClick(event)">
    <div class="modal-content" id="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Nueva Cita</h3>
            <button class="btn-close" onclick="cerrarModal()">✕</button>
        </div>
        <div class="modal-body">
            <div id="modalAlert" class="alert hidden"></div>
            <form id="citaForm" novalidate>
                <input type="hidden" id="citaId" />

                <div class="form-row">
                    <div class="form-group">
                        <label>Paciente *</label>
                        <select id="fPaciente" required>
                            <option value="">— Selecciona paciente —</option>
                        </select>
                        <span class="field-error" id="ePaciente"></span>
                    </div>
                    <div class="form-group">
                        <label>Doctor *</label>
                        <select id="fDoctor" required>
                            <option value="">— Selecciona doctor —</option>
                        </select>
                        <span class="field-error" id="eDoctor"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Fecha y Hora *</label>
                        <input type="datetime-local" id="fFechaHora" required />
                        <span class="field-error" id="eFechaHora"></span>
                    </div>
                    <div class="form-group">
                        <label>Duración (minutos)</label>
                        <input type="number" id="fDuracion" value="30" min="10" max="180" />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Motivo</label>
                        <input type="text" id="fMotivo" maxlength="255" />
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="fEstado">
                            <option value="PROGRAMADA">🟡 Programada</option>
                            <option value="EN_CURSO">🔵 En curso</option>
                            <option value="COMPLETADA">🟢 Completada</option>
                            <option value="CANCELADA">🔴 Cancelada</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Notas adicionales</label>
                    <textarea id="fNotas" rows="3" maxlength="1000"
                              style="width:100%;padding:.5rem;border:1.5px solid var(--border-color);border-radius:8px;font-family:inherit;resize:vertical;"></textarea>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-primary" id="btnGuardar" onclick="guardar()">💾 Guardar</button>
        </div>
    </div>
</div>

<!-- MODAL Confirmar eliminación -->
<div class="modal hidden" id="deleteOverlay" onclick="cerrarDeleteSiClick(event)">
    <div class="modal-content" style="max-width: 400px;">
        <div class="modal-header">
            <h3>Confirmar eliminación</h3>
            <button class="btn-close" onclick="cerrarDelete()">✕</button>
        </div>
        <div class="modal-body">
            <p>¿Eliminar la cita de <strong id="deleteNombre"></strong>?</p>
            <p class="text-muted">Esta acción no se puede deshacer.</p>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="cerrarDelete()">Cancelar</button>
            <button class="btn-danger" id="btnConfirmDelete" onclick="confirmarEliminar()">🗑 Eliminar</button>
        </div>
    </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/citas.js"></script>
<script>
    requireAuth();
    const user = getUser();
    document.getElementById('topUser').textContent = `${user.nombre} (${user.rol})`;
    document.getElementById('userInfo').innerHTML = `<strong>${user.nombre} ${user.apellido}</strong><br><small>${user.rol}</small>`;
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    document.getElementById('searchInput').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') buscar();
        if (this.value === '') cargarCitas();
    });
</script>
</body>
</html>
