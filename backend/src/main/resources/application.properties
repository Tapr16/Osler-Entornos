# ============================================================
# OSLER — application.properties
# ============================================================

# --- Servidor ---
server.port=8080

# --- Base de datos MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/osler_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=TU_PASSWORD_AQUI
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# --- JWT ---
# IMPORTANTE: cambia este secreto en producción (mínimo 256 bits)
jwt.secret=OslerSecretKey2024$SuperSegura$CambiarEnProduccion$EntornosProg
jwt.expiration-ms=86400000

# --- CORS (permite llamadas desde el frontend) ---
spring.web.cors.allowed-origins=*

# --- Logging ---
logging.level.com.osler=DEBUG
